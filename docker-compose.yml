services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: precificacao3df
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-007182}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d precificacao3df"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp:
    build:
      context: .
      dockerfile: src/Presentation/AssistenteDB.Mcp/Dockerfile
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=precificacao3df;Username=postgres;Password=${POSTGRES_PASSWORD:-007182}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
